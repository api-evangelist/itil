aid: itil
name: ITIL
description: >-
  ITIL (IT Infrastructure Library) is a set of detailed practices for IT
  service management (ITSM) that focuses on aligning IT services with the needs
  of businesses. ITIL provides a practical framework for identifying, planning,
  delivering, and supporting IT services to businesses.
